site_name: Understanding Metadata

theme:
  name: material
  features:
#    - navigation.expand
    - navigation.prune  # use this to collapse twhen more than one module is live
    - content.tooltips
  logo: assets/closer.png
  font:
    text: Source Sans Pro  
  palette:
    primary: green    
nav:
  - Introductory course: 
    - Getting started: "introduction/1.0 Module Introduction.md"
    - 1.1 Research Data: "introduction/1.1 Research data.md"
    - 1.2 Research Data Management: "introduction/1.2 Research data management.md"
    - 1.3 FAIR: "introduction/1.3 FAIR.md"
    - 2.1 Introduction to Metadata: "introduction/2.1 Introduction to metadata.md"
    - 2.2 Metadata in the Research Data Lifecycle: "introduction/2.2 Metadata in the research lifecycle.md"
    - 2.3 Using Metadata: "introduction/2.3 Using metadata - discover data.md"
    - 2.4 Controlled Vocabularies: "introduction/2.4 Controlled vocabularies.md"
    - 2.5 Metadata Standards: "introduction/2.5 Metadata standards.md"
    - 2.6 Creating metadata: "introduction/2.6 Creating metadata, study level.md"
    - 3.0 Metadata activity: "introduction/activity.md"
    - 4.0 Summary: "introduction/2.7 Introduction summary.md"  
  - Foundation course: 
   # - Overview: "foundation/0 F_overview_planning.md"
    - Getting started: "foundation/0. Getting started.md"
   # - Introduction: "foundation/1.0  Introduction.md"
    - 1.1 Who should Create Metadata?: "foundation/1.1 Who should create metadata.md"
    - 1.2 Why Metadata Matters: "foundation/1.2 Why metadata matters.md"
    #- 2.0 Core Metadata: "foundation/2.0 Core metadata elements.md"
    - 2.1 Unit Type, Population and Universe: "foundation/2.1 Unit type, Population and Universe.md"
    - 2.2 Data Collection Metadata: "foundation/2.2 Data collection metadata.md"
    - 2.3 Question and Measurement Metadata: "foundation/2.3 Question and measurement metadata.md"
    - 2.4 Codes and Category Metadata: "foundation/2.4 Codes and category metadata.md"
    - 2.5 Variable Metadata: "foundation/2.5 Variable metadata.md"
    - 2.6 Concept Metadata: "foundation/2.6 Concept metadata.md"
    - 2.7 Study Metadata: "foundation/2.7 Study metadata.md"  
    - 2.8 Dataset Metadata: "foundation/2.8 Dataset metadata.md"  
    - 3.0 Metadata Relationships: "foundation/3. Metadata relationships.md"  
    - 4.1 Considerations for what Metadata to Create: "foundation/4.1 Considerations for what metadata to create.md"  
    - 4.2 How to Create Metadata: "foundation/4.2 How to create metadata.md"  
    - 5.1 Activity - Create Study Metadata : "foundation/4.3 Create study metadata activity.md"  
    # 4.4 Activity - Create Dataset Metadata : "foundation/4.4 Create dataset metadata activity.md"  
    # 4.5 Activity - Create Variable Metadata : "foundation/4.5 Create variable metadata activity.md"  
    - 5.2 Activity - Create Dataset, Variable & Question Metadata : "foundation/4.6 Create dataset, variable and question metadata activity.md"  
  - Resources: "resources.md"
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      
extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-XM55ZQ1426
  
